services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - .env.docker
    environment:
      PORT: 3000
      CLIENT_URL: "*"
    ports:
      - "3000:3000"
    volumes:
      - ./apps/backend/src:/app/src
    command: npm run dev

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web/src:/app/src
      - ./apps/web/index.html:/app/index.html
      - ./apps/web/vite.config.js:/app/vite.config.js
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

  mobile:
    build:
      context: .
      dockerfile: apps/mobile/Dockerfile
    environment:
      EXPO_PUBLIC_API_BASE_URL: ${EXPO_PUBLIC_API_BASE_URL:-http://host.docker.internal:3000}
      EXPO_NO_TELEMETRY: "1"
      EXPO_OFFLINE: "0"
      REACT_NATIVE_PACKAGER_HOSTNAME: ${LAN_IP:-}
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    volumes:
      - ./apps/mobile/App.js:/app/App.js
      - ./apps/mobile/src:/app/src
      - ./apps/mobile/assets:/app/assets
    depends_on:
      - backend
    stdin_open: true
    tty: true
    command: npx expo start --lan --clear
